  <style>
    :root {
      --bg:        #0a0a0b;
      --bg-card:   #111115;
      --bg-card2:  #18181f;
      --border:    rgba(255,255,255,0.07);
      --pink:      #b57c8a;
      --pink-dark: #8a5c68;
      --pink-glow: rgba(181,124,138,0.18);
      --text:      #f0eff2;
      --muted:     #7a7985;
      --label:     #a09faa;
      --font-head: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.65;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--pink); color: #fff; }

    /* ── JOB HERO ── */
    .job-hero {
      position: relative;
      padding: 140px 48px 60px;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--bg-card), var(--bg));
    }

    .hero-glow {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at center, var(--pink-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--pink); }

    .job-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
      color: #fff;
    }

    .job-meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 24px;
    }

    .job-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      color: var(--label);
      background: rgba(255,255,255,0.03);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    .job-meta-item svg { width: 14px; height: 14px; color: var(--pink); }

    /* ── LAYOUT ── */
    .job-container {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 48px;
      padding: 60px 48px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .job-content h3 {
      font-size: 1.4rem;
      color: #fff;
      margin: 32px 0 16px;
    }

    .job-content p {
      color: var(--muted);
      margin-bottom: 16px;
    }

    .job-content ul {
      list-style: none;
      margin-bottom: 24px;
    }

    .job-content ul li {
      position: relative;
      padding-left: 24px;
      margin-bottom: 12px;
      color: var(--text);
    }

    .job-content ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      top: 0;
      color: var(--pink);
      font-weight: bold;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      position: sticky;
      top: 100px;
    }

    .form-card h3 {
      font-size: 1.2rem;
      color: #fff;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .form-group { margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .form-row .form-group { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--label);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select, textarea {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.95rem;
      transition: all 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--pink);
      background: rgba(181,124,138,0.05);
    }

    select option {
      background: #1a1a1a;
      color: #fff;
    }

    .upload-area {
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      background: rgba(255,255,255,0.02);
      transition: all 0.2s;
    }
    .upload-area:hover { border-color: var(--pink); background: rgba(181,124,138,0.05); }
    .upload-icon { width: 24px; height: 24px; color: var(--pink); margin-bottom: 8px; }
    .upload-text { font-size: 0.9rem; color: var(--text); }
    .upload-text span { color: var(--pink); font-weight: 500; }
    .upload-hint { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    .btn-primary {
      width: 100%;
      background: var(--pink);
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      margin-top: 24px;
    }
    .btn-primary:hover { background: var(--pink-dark); transform: translateY(-2px); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .btn-primary svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Success toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--bg-card);
      border: 1px solid rgba(217,120,138,0.35);
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2000;
      transform: translateY(80px);
      opacity: 0;
      transition: all .4s cubic-bezier(.22,1,.36,1);
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; pointer-events: all; }
    .toast-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(217,120,138,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .toast-icon svg { width: 16px; height: 16px; color: var(--pink); }
    .toast-text strong { display: block; font-size: 0.9rem; font-weight: 600; color: var(--text); }
    .toast-text span { font-size: 0.8rem; color: var(--muted); }

    /* Loader */
    .loader { text-align: center; padding: 100px; color: var(--muted); }

    /* Responsive */
    @media (max-width: 900px) {
      .job-container { grid-template-columns: 1fr; }
      .job-hero { padding: 120px 24px 40px; }
      .job-container { padding: 40px 24px; gap: 32px; }
      .form-row { grid-template-columns: 1fr; }
      .form-card { position: static; }
    }
  </style>
</head>
<body>

  <!-- Shared header injected by components.js -->

  <div id="jobWrapper">
    <div class="loader" id="loader">Loading job details...</div>
  </div>

  <!-- SUCCESS TOAST -->
  <div class="toast" id="toast">
    <div class="toast-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="toast-text">
      <strong>Successfully Applied!</strong>
      <span>Thank you for applying. We have received your application and will be in touch soon.</span>
    </div>
  </div>

  <script>
    let currentJobId = null;

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadJob() {
      const urlParams = new URLSearchParams(window.location.search);
      const jobId = urlParams.get('id');
      const wrapper = document.getElementById('jobWrapper');

      if (!jobId) {
        wrapper.innerHTML = '<div class="loader" style="color:var(--pink)">Job ID is missing. <a href="/careers" style="color:#fff">Go back to careers</a></div>';
        return;
      }

      currentJobId = jobId;

      try {
        let job;
        
        if (jobId === 'general') {
          job = {
            id: 'general',
            title: 'Open Application',
            job_type: 'General',
            location: 'Remote / Hybrid',
            experience: 'Any',
            description: 'Don\'t see your perfect role? We\'re always looking for exceptional talent. Send us your portfolio and tell us how you\'d contribute to Flurix.in.',
            responsibilities: ['Tell us how you can contribute to Flurix.in.'],
            qualifications: ['We look for exceptional talent across all fields.']
          };
        } else {
          const res = await axios.get('https://api.flurix.in/careers/get_job/' + jobId);
          job = res.data;
        }

        renderJobLayout(job, wrapper);

      } catch (err) {
        console.error(err);
        wrapper.innerHTML = '<div class="loader" style="color:var(--pink)">Failed to load job details. The role may have been closed. <br><br><a href="/careers" style="color:#fff;text-decoration:underline;">Back to Careers</a></div>';
      }
    }

    function renderJobLayout(job, wrapper) {
      let respHtml = '';
      if(job.responsibilities && job.responsibilities.length > 0) {
        respHtml = `<h3>What You'll Do</h3><ul>` + 
          job.responsibilities.map(r => `<li>${escHtml(r)}</li>`).join('') + 
          `</ul>`;
      }

      let qualHtml = '';
      if(job.qualifications && job.qualifications.length > 0) {
        qualHtml = `<h3>What We're Looking For</h3><ul>` + 
          job.qualifications.map(q => `<li>${escHtml(q)}</li>`).join('') + 
          `</ul>`;
      }

      wrapper.innerHTML = `
        <section class="job-hero">
          <div class="hero-glow"></div>
          <a href="/careers" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to All Careers
          </a>
          <h1 class="job-title">${escHtml(job.title)}</h1>
          <div class="job-meta-bar">
            <span class="job-meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${escHtml(job.location)}
            </span>
            <span class="job-meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
              ${escHtml(job.job_type)}
            </span>
            <span class="job-meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Exp: ${escHtml(job.experience || 'Not specified')}
            </span>
          </div>
        </section>

        <div class="job-container">
          <div class="job-content">
            <h3>About the Role</h3>
            <p>${escHtml(job.description)}</p>
            ${respHtml}
            ${qualHtml}
          </div>

          <div>
            <div class="form-card">
              <h3>Apply for this role</h3>
              <form id="applyForm" onsubmit="event.preventDefault(); submitApplication();">
                <div class="form-row">
                  <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" id="firstName" placeholder="Arjun" required />
                  </div>
                  <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" id="lastName" placeholder="Sharma" required />
                  </div>
                </div>
                <div class="form-group">
                  <label>Email Address *</label>
                  <input type="email" id="email" placeholder="arjun@example.com" required />
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+91 98765 43210" />
                  </div>
                  <div class="form-group">
                    <label>LinkedIn URL</label>
                    <input type="url" id="linkedin" placeholder="https://linkedin.com/in/yourname" />
                  </div>
                </div>
                <div class="form-group">
                  <label>Portfolio / GitHub</label>
                  <input type="url" id="portfolio" placeholder="https://github.com/yourhandle" />
                </div>
                <div class="form-group">
                  <label>Gender *</label>
                  <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Resume / CV *</label>
                  <div class="upload-area" onclick="document.getElementById('resumeInput').click()">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <p class="upload-text"><span>Click to upload</span> or drag and drop</p>
                    <p class="upload-hint">PDF, DOCX up to 10MB</p>
                  </div>
                  <input type="file" id="resumeInput" accept=".pdf,.doc,.docx" style="display:none" onchange="handleFileUpload(this)" />
                  <div id="fileStatus" style="display:none; margin-top:8px; font-size:.8rem; color:var(--pink)"></div>
                </div>
                
                <button type="submit" class="btn-primary" id="submitBtn">
                  Submit Application
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
              </form>
            </div>
          </div>
        </div>
      `;
    }

    // ── FILE UPLOAD ──
    window.handleFileUpload = function(input) {
      const file = input.files[0];
      if (file) {
        const status = document.getElementById('fileStatus');
        status.style.display = 'block';
        status.textContent = '✓ ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
      }
    };

    // ── SUBMIT ──
    window.submitApplication = async function() {
      const fileInput = document.getElementById('resumeInput');
      const file = fileInput.files[0];
      
      if (!file) {
        alert("Please select a resume to upload.");
        return;
      }
      
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const linkedinUrl = document.getElementById('linkedin').value;
      const portfolioUrl = document.getElementById('portfolio').value;
      const gender = document.getElementById('gender').value;
      
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = 'Submitting...';
      submitBtn.disabled = true;

      try {
        // Step 2A: Upload
        const fileData = new FormData();
        fileData.append("file", file);
        const uploadRes = await axios.post('https://api.flurix.in/applications/upload_resume', fileData, {
          headers: { 'Content-Type': 'multipart/form-data' }
        });
        
        const resumeUrl = uploadRes.data?.resume_url || '';
        
        // Step 2B: Submit
        const payload = {
          job_id: currentJobId || 'Open_Application',
          firstname: firstName,
          lastname: lastName,
          email: email,
          phone: phone || null,
          linkedin_url: linkedinUrl || null,
          portfolio_github_url: portfolioUrl || null,
          gender: gender,
          resume_url: resumeUrl,
          status: "Pending"
        };
        
        await axios.post('https://api.flurix.in/applications/apply_for_job', payload, {
          headers: { 'Content-Type': 'application/json' }
        });
        
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        
        // Reset form
        document.getElementById('applyForm').reset();
        document.getElementById('fileStatus').style.display = 'none';
        fileInput.value = '';

        setTimeout(() => {
          toast.classList.remove('show');
          window.location.href = '/careers'; // Redirect back to careers
        }, 3000);

      } catch (error) {
        console.error("Application failed:", error.response?.data?.detail || error.message);
        alert("An error occurred. Please try again.");
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    };

    document.addEventListener("DOMContentLoaded", loadJob);
  </script>

  <script type="module" src="/src/js/components.js"></script>
</body>
</html>
