server {
    listen 80;
    server_name flurix.in www.flurix.in;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets (JS, CSS, images, fonts)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve sitemap.xml and robots.txt with short cache
    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Clean URL routing — /careers → careers.html
    location = /careers {
        try_files /careers.html =404;
    }

    # Clean URL routing — /job → job.html (with query string passthrough)
    location = /job {
        try_files /job.html =404;
    }

    # Google site verification
    location = /google8c387ec99ce04450.html {
        try_files $uri =404;
    }

    # Default: serve files directly or fall back to index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}